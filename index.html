<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>九九カード Pro</title>
    <style>
        :root { --main-color: #4A90E2; --accent-color: #ff6b6b; --accent-hover: #ee5b5b; --bg-color: #f5f7fa; }
        
        body { 
            /* 数字が見やすいUDフォント・システムフォントを優先 */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'BIZ UDPGothic', Meiryo, sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden; 
        }
        
        #menu, #game, #result { 
            width: 95%; 
            max-width: 500px; 
            height: 90vh;
            max-height: 800px;
            text-align: center; 
            box-sizing: border-box; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        #game, #result { display: none; }

        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr) !important; 
            gap: 12px; 
            margin: 15px 0; 
            width: 100%; 
        }
        
        button { 
            padding: 15px 5px; 
            font-size: 1.1rem; 
            border: none; 
            border-radius: 12px; 
            background: #f0f4f8; 
            box-shadow: 0 4px 0px #cfd8e3; 
            cursor: pointer; 
            transition: all 0.1s; 
        }
        
        @media (hover: hover) {
            button:hover:not(.active):not(.start-btn) { background: #e2e8f0; }
            .start-btn:hover { background: var(--accent-hover); }
        }

        button:active { transform: translateY(2px); box-shadow: none; }
        button.active { background: var(--main-color); color: white; box-shadow: 0 4px 0px #357ABD; }
        
        .start-btn { 
            width: 100%; 
            background: var(--accent-color); 
            color: white; 
            font-weight: bold; 
            font-size: 1.5rem; 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 6px 0px #e65b5b;
        }
        .start-btn:active { transform: translateY(3px); box-shadow: none; }

        .timer { font-size: 1.8rem; margin-bottom: 5px; font-weight: 400; color: #aaa; font-family: 'Helvetica Neue', sans-serif; }
        
        .card-container { 
            width: 100%; 
            max-width: 450px; 
            aspect-ratio: 3 / 2;
            margin: 10px auto; 
            position: relative; 
            cursor: pointer; 
            border-radius: 30px;
        }
        
        /* カード内の式：視認性重視の設定 */
        .card { 
            width: 100%; 
            height: 100%; 
            background: white; 
            border-radius: 30px; 
            border: 6px solid var(--main-color); 
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: clamp(4.5rem, 18vw, 7.5rem); /* 少しだけサイズを抑えて余白を確保 */
            font-weight: 700; /* 800から700へ：潰れを防止 */
            letter-spacing: 0.05em; /* 文字間をわずかに広げて可読性アップ */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            position: absolute; 
            top: 0; left: 0; 
            z-index: 1;
        }
        
        .card.is-answered { color: var(--accent-color); background: #fff5f5; border-color: var(--accent-color); }

        .fade-in { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .fade-out { animation: fadeOut 0.1s ease-in forwards; }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.98); } }

        .hint { color: #888; margin-top: 15px; font-size: 0.9rem; line-height: 1.4; }
        .mode-label { font-size: 0.9rem; color: #666; align-self: flex-start; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="margin: 0 0 5px; color: var(--main-color);">九九カード</h1>
        <div class="mode-label">練習する段（複数えらべるよ）</div>
        <div class="btn-grid" id="dan-selector"></div>
        <div class="mode-label">ならびかた</div>
        <div style="margin: 10px 0; display: flex; gap: 10px; width: 100%;">
            <button id="order-normal" class="active" onclick="setOrder('normal')" style="flex:1;">のぼり</button>
            <button id="order-reverse" onclick="setOrder('reverse')" style="flex:1;">くだり</button>
            <button id="order-random" onclick="setOrder('random')" style="flex:1;">ランダム</button>
        </div>
        <button class="start-btn" onclick="startGame()">スタート！</button>
    </div>

    <div id="game">
        <div class="timer" id="timerDisplay">00.00</div>
        <div class="card-container" id="cardContainer" onclick="toggleAnswer()">
            <div class="card" id="card"></div>
        </div>
        <div class="hint">
            PC：[←][→]キーで移動 / [Enter]で答え<br>
            スマホ：左右スワイプで移動 / タップで答え
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; border:none; background:none; color:#aaa; text-decoration:underline; cursor:pointer; font-size:0.9rem;">最初に戻る</button>
    </div>

    <div id="result">
        <h2 style="font-size: 2rem; margin-bottom: 10px;">おめでとう！</h2>
        <p id="result-info" style="color: #666;"></p>
        <div id="result-time" style="font-size:5rem; color:var(--accent-color); font-weight:bold; margin: 20px 0;"></div>
        <button class="start-btn" onclick="location.reload()">メニューにもどる</button>
    </div>

    <script>
        let selectedDans = [], order = 'normal', problems = [], currentIndex = 0, startTime, timerInterval, isAnswered = false;

        const danSelector = document.getElementById('dan-selector');
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.innerText = i + 'の段';
            btn.onclick = () => toggleDan(i, btn);
            danSelector.appendChild(btn);
        }

        function toggleDan(dan, btn) {
            const index = selectedDans.indexOf(dan);
            if (index === -1) { selectedDans.push(dan); btn.classList.add('active'); } 
            else { selectedDans.splice(index, 1); btn.classList.remove('active'); }
        }

        function setOrder(type) {
            order = type;
            document.querySelectorAll('#order-normal, #order-reverse, #order-random').forEach(b => b.classList.remove('active'));
            document.getElementById(`order-${type}`).classList.add('active');
        }

        function startGame() {
            if (selectedDans.length === 0) { alert('練習したい段をえらんでね！'); return; }
            problems = [];
            selectedDans.sort((a,b) => a - b).forEach(dan => {
                for (let i = 1; i <= 9; i++) { problems.push({ q: `${dan} × ${i}`, a: dan * i }); }
            });
            if (order === 'reverse') problems.reverse();
            if (order === 'random') problems.sort(() => Math.random() - 0.5);
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            currentIndex = 0; updateCard(true); startTimer();
        }

        function updateCard(isFirst = false) {
            if (currentIndex >= problems.length) { showResult(); return; }
            if (currentIndex < 0) { currentIndex = 0; return; }
            const card = document.getElementById('card');
            isAnswered = false;
            const setup = () => {
                card.classList.remove('fade-out', 'is-answered');
                card.innerText = problems[currentIndex].q;
                void card.offsetWidth; card.classList.add('fade-in');
            };
            if (isFirst) setup(); else {
                card.classList.remove('fade-in'); card.classList.add('fade-out');
                setTimeout(setup, 100);
            }
        }

        function toggleAnswer() {
            const card = document.getElementById('card');
            if (!isAnswered) { card.innerText = problems[currentIndex].a; card.classList.add('is-answered'); isAnswered = true; }
            else { card.innerText = problems[currentIndex].q; card.classList.remove('is-answered'); isAnswered = false; }
        }

        function nextCard() { currentIndex++; updateCard(); }
        function prevCard() { currentIndex--; updateCard(); }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                document.getElementById('timerDisplay').innerText = ((Date.now() - startTime) / 1000).toFixed(2);
            }, 50);
        }

        function showResult() {
            clearInterval(timerInterval);
            document.getElementById('game').style.display = 'none';
            document.getElementById('result').style.display = 'flex';
            document.getElementById('result-info').innerText = `${selectedDans.map(d=>d+'の段').join(', ')} 全${problems.length}問`;
            document.getElementById('result-time').innerText = document.getElementById('timerDisplay').innerText + "秒";
        }

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('game').style.display !== 'flex') return;
            if (e.key === 'ArrowRight' || e.key === ' ') { nextCard(); }
            if (e.key === 'ArrowLeft') { prevCard(); }
            if (e.key === 'Enter') toggleAnswer();
        });

        const container = document.getElementById('cardContainer');
        let startX, isMoving = false;
        container.addEventListener('touchstart', e => { startX = e.touches[0].pageX; isMoving = false; }, {passive: true});
        container.addEventListener('touchmove', e => { if (Math.abs(e.touches[0].pageX - startX) > 10) isMoving = true; }, {passive: true});
        container.addEventListener('touchend', e => {
            if (document.getElementById('game').style.display !== 'flex') return;
            let diffX = startX - e.changedTouches[0].pageX;
            if (isMoving && Math.abs(diffX) > 50) { if (diffX > 0) nextCard(); else prevCard(); }
        }, {passive: true});
    </script>
</body>
</html>
